name: clara-app

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILE:-5}

services:
  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://clara:clara_dev_password@postgres:5432/clara}
      DATABASE_FALLBACK_ENABLED: ${DATABASE_FALLBACK_ENABLED:-false}
      DATABASE_FALLBACK_URL: ${DATABASE_FALLBACK_URL:-sqlite+pysqlite:////data/clara.db}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://clara.thiennn.icu}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Authorization,Content-Type,X-CSRF-Token}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_super_secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-43200}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_CSRF_ENABLED: ${AUTH_CSRF_ENABLED:-true}
      AUTH_CSRF_COOKIE_NAME: ${AUTH_CSRF_COOKIE_NAME:-clara_csrf_token}
      AUTH_BOOTSTRAP_ADMIN_ENABLED: ${AUTH_BOOTSTRAP_ADMIN_ENABLED:-true}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-wrongpass}
      AUTH_BOOTSTRAP_ADMIN_FORCE_RESET_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_FORCE_RESET_PASSWORD:-true}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
      AUTH_AUTO_PROVISION_USERS: ${AUTH_AUTO_PROVISION_USERS:-false}
      MEDICAL_DISCLAIMER_VERSION: ${MEDICAL_DISCLAIMER_VERSION:-2026-04-v1}
      GLOBAL_RATE_LIMIT_PER_MIN: ${GLOBAL_RATE_LIMIT_PER_MIN:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECURITY_REDIS_KEY_PREFIX: ${SECURITY_REDIS_KEY_PREFIX:-clara:sec}
      RATE_LIMIT_DISTRIBUTED_ENABLED: ${RATE_LIMIT_DISTRIBUTED_ENABLED:-false}
      AUTH_LOGIN_DISTRIBUTED_ENABLED: ${AUTH_LOGIN_DISTRIBUTED_ENABLED:-false}
      PUBMED_RATE_LIMIT_PER_SEC: ${PUBMED_RATE_LIMIT_PER_SEC:-10}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml:8010}
      ML_INTERNAL_API_KEY: ${ML_INTERNAL_API_KEY:-}
      ML_SERVICE_TIMEOUT_SECONDS: ${ML_SERVICE_TIMEOUT_SECONDS:-20}
      ML_RESEARCH_TIMEOUT_SECONDS: ${ML_RESEARCH_TIMEOUT_SECONDS:-300}
      RESEARCH_JOB_MAX_WORKERS: ${RESEARCH_JOB_MAX_WORKERS:-8}
      METRICS_ACCESS_TOKEN: ${METRICS_ACCESS_TOKEN:-}
      DEEPSEEK_STRICT_MODE: ${DEEPSEEK_STRICT_MODE:-false}
      TGC_OCR_BASE_URL: ${TGC_OCR_BASE_URL:-http://host.docker.internal:8080}
      TGC_OCR_ENDPOINTS: ${TGC_OCR_ENDPOINTS:-/api/ocr,/api/extract,/ocr}
      TGC_OCR_TIMEOUT_SECONDS: ${TGC_OCR_TIMEOUT_SECONDS:-45}
      TGC_OCR_API_KEY: ${TGC_OCR_API_KEY:-}
      API_UVICORN_WORKERS: ${API_UVICORN_WORKERS:-4}
    ports:
      - "127.0.0.1:${APP_API_PORT:-8100}:8000"
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - clara_api_data:/data
    networks:
      - default
      - clara-local

  ml:
    build:
      context: ../..
      dockerfile: services/ml/Dockerfile
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ML_INTERNAL_API_KEY: ${ML_INTERNAL_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.yescale.vip/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v3.2}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-30}
      DEEPSEEK_REQUIRED: ${DEEPSEEK_REQUIRED:-false}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      YESCALE_API_KEY: ${YESCALE_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.yescale.io/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-6}
      EXTERNAL_DDI_ENABLED: ${EXTERNAL_DDI_ENABLED:-true}
      EXTERNAL_DDI_TIMEOUT_SECONDS: ${EXTERNAL_DDI_TIMEOUT_SECONDS:-1.5}
      RAG_EXTERNAL_CONNECTORS_ENABLED: ${RAG_EXTERNAL_CONNECTORS_ENABLED:-true}
      RAG_EXTERNAL_TIMEOUT_SECONDS: ${RAG_EXTERNAL_TIMEOUT_SECONDS:-4}
      RAG_RERANKER_ENABLED: ${RAG_RERANKER_ENABLED:-false}
      RAG_RERANKER_STRATEGY: ${RAG_RERANKER_STRATEGY:-embedding}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-embedding-cosine-reranker-v1}
      RAG_RERANKER_TOP_N: ${RAG_RERANKER_TOP_N:-12}
      RAG_RERANKER_TIMEOUT_MS: ${RAG_RERANKER_TIMEOUT_MS:-250}
      RAG_RERANKER_LLM_ENABLED: ${RAG_RERANKER_LLM_ENABLED:-false}
      RAG_RERANKER_LLM_TOP_N: ${RAG_RERANKER_LLM_TOP_N:-6}
      RAG_RERANKER_LLM_TIMEOUT_MS: ${RAG_RERANKER_LLM_TIMEOUT_MS:-900}
      RAG_NLI_ENABLED: ${RAG_NLI_ENABLED:-true}
      RAG_NLI_STRATEGY: ${RAG_NLI_STRATEGY:-heuristic}
      RAG_NLI_TIMEOUT_MS: ${RAG_NLI_TIMEOUT_MS:-180}
      RAG_NLI_LLM_ENABLED: ${RAG_NLI_LLM_ENABLED:-false}
      RAG_NLI_LLM_TIMEOUT_MS: ${RAG_NLI_LLM_TIMEOUT_MS:-900}
      RAG_NLI_MIN_CONFIDENCE: ${RAG_NLI_MIN_CONFIDENCE:-0.35}
      RAG_GRAPHRAG_ENABLED: ${RAG_GRAPHRAG_ENABLED:-false}
      RAG_BIOMEDICAL_RERANK_ENABLED: ${RAG_BIOMEDICAL_RERANK_ENABLED:-false}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080}
      SEARXNG_TIMEOUT_SECONDS: ${SEARXNG_TIMEOUT_SECONDS:-3}
      SEARXNG_CRAWL_ALLOWED_DOMAINS: ${SEARXNG_CRAWL_ALLOWED_DOMAINS:-who.int,nih.gov,ncbi.nlm.nih.gov,pubmed.ncbi.nlm.nih.gov,open.fda.gov,fda.gov,dailymed.nlm.nih.gov,clinicaltrials.gov,ema.europa.eu,bmj.com,thelancet.com}
      ML_UVICORN_WORKERS: ${ML_UVICORN_WORKERS:-8}
    depends_on:
      - searxng
    ports:
      - "127.0.0.1:${APP_ML_PORT:-8110}:8010"
    logging: *default-logging

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      BASE_URL: ${SEARXNG_PUBLIC_BASE_URL:-http://127.0.0.1:8888/}
      INSTANCE_NAME: CLARA SearXNG
      UWSGI_WORKERS: 2
      UWSGI_THREADS: 2
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "127.0.0.1:${APP_SEARXNG_PORT:-8888}:8080"
    logging: *default-logging

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    environment:
      NEXT_SERVER_API_PROXY: ${NEXT_SERVER_API_PROXY:-http://api:8000/api/v1}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:${APP_WEB_PORT:-3100}:3000"
    logging: *default-logging

volumes:
  clara_api_data:

networks:
  clara-local:
    external: true
    name: clara-local_default
