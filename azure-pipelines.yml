trigger:
  branches:
    include:
      - "*"

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: Quality
    displayName: "Quality Gate"
    jobs:
      - job: quality_checks
        displayName: "Ruff + mypy + pytest + docs-check"
        steps:
          - checkout: self
            clean: true

          - task: UsePythonVersion@0
            displayName: "Use Python 3.11"
            inputs:
              versionSpec: "3.11"

          - script: |
              python -m pip install --upgrade pip
              pip install "ruff==0.6.9" "mypy==1.11.2" "pytest==8.3.2"
            displayName: "Install quality tools"

          - script: |
              bash scripts/docs/check-docs-links.sh
            displayName: "Run docs link check"

          - script: |
              set -euo pipefail
              targets=()
              for d in services/api/src services/api/tests services/ml/src services/ml/tests scripts; do
                if [ -d "$d" ]; then
                  targets+=("$d")
                fi
              done
              if [ "${#targets[@]}" -gt 0 ]; then
                ruff check "${targets[@]}"
              else
                echo "No Python source directories found. Skip Ruff."
              fi
            displayName: "Run Ruff"

          - script: |
              set -euo pipefail
              targets=()
              for d in services/api/src services/ml/src; do
                if [ -d "$d" ]; then
                  targets+=("$d")
                fi
              done
              if [ "${#targets[@]}" -gt 0 ]; then
                mypy "${targets[@]}" --ignore-missing-imports
              else
                echo "No mypy targets found. Skip mypy."
              fi
            displayName: "Run mypy"

          - script: |
              set -euo pipefail
              targets=()
              for d in services/api/tests services/ml/tests; do
                if [ -d "$d" ]; then
                  targets+=("$d")
                fi
              done
              if [ "${#targets[@]}" -gt 0 ]; then
                pytest -q "${targets[@]}"
              else
                echo "No pytest targets found. Skip pytest."
              fi
            displayName: "Run pytest"
