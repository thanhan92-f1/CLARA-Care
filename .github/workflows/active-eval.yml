name: Active Eval

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode for KPI loop"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - static
      strict:
        description: "Enforce strict live gate"
        required: true
        default: true
        type: boolean
      negative_limit:
        description: "Max mined hard negatives"
        required: true
        default: "150"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: active-eval-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-active-eval:
    name: run active eval loop
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve execution context
        id: ctx
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ github.event.inputs.mode }}"
            strict="${{ github.event.inputs.strict }}"
            negative_limit="${{ github.event.inputs.negative_limit }}"
          else
            mode="live"
            strict="true"
            negative_limit="150"
          fi
          run_id="active-eval-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "mode=${mode}"
            echo "strict=${strict}"
            echo "negative_limit=${negative_limit}"
            echo "run_id=${run_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Guard missing secrets in live mode
        id: guard
        env:
          MODE: ${{ steps.ctx.outputs.mode }}
          API_BASE: ${{ secrets.CLARA_API_BASE_URL }}
          ML_BASE: ${{ secrets.CLARA_ML_BASE_URL }}
          EMAIL: ${{ secrets.CLARA_DEMO_EMAIL }}
          PASSWORD: ${{ secrets.CLARA_DEMO_PASSWORD }}
          DOCTOR_EMAIL: ${{ secrets.CLARA_DOCTOR_EMAIL }}
          DOCTOR_PASSWORD: ${{ secrets.CLARA_DOCTOR_PASSWORD }}
        run: |
          set -euo pipefail
          should_run="true"
          if [ "${MODE}" = "live" ]; then
            missing=0
            for key in API_BASE ML_BASE EMAIL PASSWORD DOCTOR_EMAIL DOCTOR_PASSWORD; do
              if [ -z "${!key:-}" ]; then
                echo "::warning::Missing secret for ${key}"
                missing=$((missing + 1))
              fi
            done
            if [ "${missing}" -gt 0 ]; then
              should_run="false"
            fi
          fi
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

      - name: Download previous active-eval artifact
        id: prev
        if: ${{ steps.guard.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          OUT_DIR="${RUNNER_TEMP}/previous-active-eval"
          mkdir -p "${OUT_DIR}"

          runs_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/workflows/active-eval.yml/runs?status=success&branch=${BRANCH}&per_page=10")"

          prev_run_id="$(RUNS_JSON="$runs_json" CURRENT_RUN_ID="$CURRENT_RUN_ID" python - <<'PY'
          import json, os
          payload = json.loads(os.environ["RUNS_JSON"])
          current = str(os.environ.get("CURRENT_RUN_ID", ""))
          for run in payload.get("workflow_runs", []):
              rid = str(run.get("id") or "")
              if rid and rid != current:
                  print(rid)
                  break
          PY
          )"

          if [ -z "${prev_run_id}" ]; then
            echo "No previous successful active-eval run found."
            echo "previous_kpi=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          artifacts_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${prev_run_id}/artifacts?per_page=50")"

          archive_url="$(ARTIFACTS_JSON="$artifacts_json" python - <<'PY'
          import json, os
          payload = json.loads(os.environ["ARTIFACTS_JSON"])
          for item in payload.get("artifacts", []):
              name = str(item.get("name") or "")
              if name.startswith("active-eval-"):
                  print(str(item.get("archive_download_url") or ""))
                  break
          PY
          )"

          if [ -z "${archive_url}" ]; then
            echo "No active-eval artifact found in previous run."
            echo "previous_kpi=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${archive_url}" -o "${OUT_DIR}/prev-active-eval.zip"

          unzip -o -q "${OUT_DIR}/prev-active-eval.zip" -d "${OUT_DIR}/unzipped"
          previous_kpi="$(find "${OUT_DIR}/unzipped" -type f -path "*/kpi-report/kpi-report.json" | head -n1 || true)"
          if [ -n "${previous_kpi}" ]; then
            echo "Recovered previous KPI: ${previous_kpi}"
            echo "previous_kpi=${previous_kpi}" >> "$GITHUB_OUTPUT"
          else
            echo "No kpi-report.json found in downloaded artifact."
            echo "previous_kpi=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run active eval loop
        if: ${{ steps.guard.outputs.should_run == 'true' }}
        env:
          CLARA_API_BASE_URL: ${{ secrets.CLARA_API_BASE_URL }}
          CLARA_ML_BASE_URL: ${{ secrets.CLARA_ML_BASE_URL }}
          CLARA_DEMO_EMAIL: ${{ secrets.CLARA_DEMO_EMAIL }}
          CLARA_DEMO_PASSWORD: ${{ secrets.CLARA_DEMO_PASSWORD }}
          CLARA_DOCTOR_EMAIL: ${{ secrets.CLARA_DOCTOR_EMAIL }}
          CLARA_DOCTOR_PASSWORD: ${{ secrets.CLARA_DOCTOR_PASSWORD }}
        run: |
          set -euo pipefail
          cmd=(bash scripts/demo/run_active_eval_loop.sh \
            --run-id "${{ steps.ctx.outputs.run_id }}" \
            --mode "${{ steps.ctx.outputs.mode }}" \
            --api-base "${CLARA_API_BASE_URL:-http://127.0.0.1:8000}" \
            --ml-base "${CLARA_ML_BASE_URL:-http://127.0.0.1:8001}" \
            --email "${CLARA_DEMO_EMAIL:-}" \
            --password "${CLARA_DEMO_PASSWORD:-}" \
            --doctor-email "${CLARA_DOCTOR_EMAIL:-}" \
            --doctor-password "${CLARA_DOCTOR_PASSWORD:-}" \
            --strict "${{ steps.ctx.outputs.strict }}" \
            --limit "${{ steps.ctx.outputs.negative_limit }}" \
            --compare-strict "${{ steps.ctx.outputs.strict }}")
          if [ -n "${{ steps.prev.outputs.previous_kpi }}" ]; then
            cmd+=(--previous-kpi "${{ steps.prev.outputs.previous_kpi }}")
          fi
          "${cmd[@]}"

      - name: Publish active eval stage status
        if: ${{ steps.guard.outputs.should_run == 'true' }}
        env:
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          STRICT_INPUT: ${{ steps.ctx.outputs.strict }}
        run: |
          set -euo pipefail
          summary_json="artifacts/round2/${RUN_ID}/active-eval-summary.json"
          if [ ! -f "${summary_json}" ]; then
            echo "::warning::Missing active eval summary JSON at ${summary_json}"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(f"artifacts/round2/{os.environ['RUN_ID']}/active-eval-summary.json")
          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          stage = payload.get("stage_status", {}) or {}
          baseline_done = bool(stage.get("baseline_done"))
          mining_done = bool(stage.get("mining_done"))
          post_done = bool(stage.get("post_run_done"))
          compare_done = bool(stage.get("compare_done"))
          gate_passed = bool(payload.get("gate_passed"))
          strict = str(os.environ.get("STRICT_INPUT", "true")).strip().lower() in {"1", "true", "yes", "on"}

          lines = [
              "## Active Eval Stage Status",
              "",
              f"- baseline_done: `{baseline_done}`",
              f"- mining_done: `{mining_done}`",
              f"- post_run_done: `{post_done}`",
              f"- compare_done: `{compare_done}`",
              f"- gate_passed: `{gate_passed}`",
              f"- strict_input: `{strict}`",
          ]
          summary_file = Path(os.environ["GITHUB_STEP_SUMMARY"])
          existing = summary_file.read_text(encoding="utf-8") if summary_file.exists() else ""
          summary_file.write_text(existing + "\n" + "\n".join(lines) + "\n", encoding="utf-8")

          if strict and not gate_passed:
              raise SystemExit("Strict active-eval gate failed")
          PY

      - name: Skip summary
        if: ${{ steps.guard.outputs.should_run != 'true' }}
        run: |
          {
            echo "## Active Eval Skipped"
            echo ""
            echo "- mode: \`${{ steps.ctx.outputs.mode }}\`"
            echo "- reason: missing required live secrets"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload active eval artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: active-eval-${{ steps.ctx.outputs.run_id }}
          path: |
            artifacts/round2/${{ steps.ctx.outputs.run_id }}*
            data/demo/hard-negative-mined-*.jsonl
            data/demo/hard-negative-mined-*.summary.json
          if-no-files-found: ignore
