name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: detect changed files
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ml: ${{ steps.filter.outputs.ml }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'services/api/**'
            ml:
              - 'services/ml/**'
            web:
              - 'apps/web/**'
            docs:
              - 'docs/**'
            docker:
              - 'deploy/docker/**'
              - 'services/**/Dockerfile'
              - 'apps/web/Dockerfile'
              - '.env.example'
            ci:
              - '.github/workflows/**'
              - 'scripts/docs/**'
              - 'Makefile'
              - 'README.md'
            python:
              - 'services/**/*.py'
              - 'scripts/**/*.py'
              - 'services/**/pyproject.toml'

  quality:
    name: docs-check + ruff + mypy
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" "mypy==1.11.2" "pytest==8.3.2"

      - name: Run docs-check
        run: |
          bash scripts/docs/check-docs-links.sh

      - name: Run Ruff
        run: |
          targets=()
          for d in services/api/src services/api/tests services/ml/src services/ml/tests scripts; do
            if [ -d "$d" ]; then
              targets+=("$d")
            fi
          done
          if [ "${#targets[@]}" -gt 0 ]; then
            ruff check "${targets[@]}"
          else
            echo "No Python source directories found. Skip Ruff."
          fi

      - name: Run mypy
        run: |
          targets=()
          for d in services/api/src services/ml/src; do
            if [ -d "$d" ]; then
              targets+=("$d")
            fi
          done
          if [ "${#targets[@]}" -gt 0 ]; then
            mypy "${targets[@]}" --ignore-missing-imports
          else
            echo "No mypy targets found. Skip mypy."
          fi

  api-tests:
    name: pytest api
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install "pytest==8.3.2"

      - name: Run API pytest
        run: |
          if [ -d "services/api/tests" ]; then
            pytest -q services/api/tests
          else
            echo "No services/api/tests directory found. Skip API pytest."
          fi

  ml-tests:
    name: pytest ml
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ml == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install "pytest==8.3.2"

      - name: Run ML pytest
        run: |
          if [ -d "services/ml/tests" ]; then
            pytest -q services/ml/tests
          else
            echo "No services/ml/tests directory found. Skip ML pytest."
          fi

  web-lint-build:
    name: web lint + build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: |
          cd apps/web
          npm ci

      - name: Run web lint
        run: |
          cd apps/web
          npm run lint

      - name: Run web build
        run: |
          cd apps/web
          npm run build

  security-audit:
    name: security audit
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit>=2.7.0"
          pip install -e services/api -e services/ml
          pip-audit --progress-spinner=off

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run npm audit
        run: |
          cd apps/web
          npm ci
          npm audit --omit=dev

  docker-compose-smoke:
    name: docker compose smoke build
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        run: |
          if [ ! -f ".env" ]; then
            cp .env.example .env
          fi

      - name: Docker compose build smoke
        run: |
          docker compose --env-file .env -f deploy/docker/docker-compose.app.yml build api ml web

      - name: Docker compose config validate
        run: |
          docker compose --env-file .env -f deploy/docker/docker-compose.app.yml config >/dev/null
