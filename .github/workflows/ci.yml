name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: detect changed files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ml: ${{ steps.filter.outputs.ml }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
      python: ${{ steps.filter.outputs.python }}
      python_changed_files: ${{ steps.filter.outputs.python_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          list-files: json
          filters: |
            api:
              - 'services/api/**'
            ml:
              - 'services/ml/**'
            web:
              - 'apps/web/**'
            docs:
              - 'docs/**'
            docker:
              - 'deploy/docker/**'
              - 'services/**/Dockerfile'
              - 'apps/web/Dockerfile'
              - '.env.example'
            ci:
              - '.github/workflows/**'
              - 'scripts/docs/**'
              - 'Makefile'
              - 'README.md'
            python:
              - 'services/**/*.py'
              - 'scripts/**/*.py'
              - 'services/**/pyproject.toml'
            python_changed:
              - 'services/**/*.py'
              - 'scripts/**/*.py'

  quality:
    name: docs-check + ruff + mypy
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/api/pyproject.toml
            services/ml/pyproject.toml

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" "mypy==1.11.2" "pytest==8.3.2"

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run docs-check
        run: |
          bash scripts/docs/check-docs-links.sh

      - name: Run Ruff
        env:
          PY_CHANGED_FILES: ${{ needs.changes.outputs.python_changed_files }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected. Skip incremental Ruff."
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          raw = os.getenv("PY_CHANGED_FILES", "").strip()
          files: list[str] = []
          if raw:
              try:
                  parsed = json.loads(raw)
              except json.JSONDecodeError as exc:
                  print(f"Unable to parse PY_CHANGED_FILES: {exc}")
                  sys.exit(1)
              if isinstance(parsed, list):
                  files = [str(item) for item in parsed if str(item).endswith(".py")]

          if not files:
              print("No changed Python files. Skip Ruff.")
              sys.exit(0)

          print("Running Ruff for files:")
          for file in files:
              print(f"- {file}")

          subprocess.run(["ruff", "check", "--extend-ignore", "B008", *files], check=True)
          PY

      - name: Run mypy
        env:
          PY_CHANGED_FILES: ${{ needs.changes.outputs.python_changed_files }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected. Skip incremental mypy."
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          raw = os.getenv("PY_CHANGED_FILES", "").strip()
          files: list[str] = []
          if raw:
              try:
                  parsed = json.loads(raw)
              except json.JSONDecodeError as exc:
                  print(f"Unable to parse PY_CHANGED_FILES: {exc}")
                  sys.exit(1)
              if isinstance(parsed, list):
                  files = [str(item) for item in parsed if str(item).endswith(".py")]

          if not files:
              print("No changed Python files. Skip mypy.")
              sys.exit(0)

          print("Running mypy for files:")
          for file in files:
              print(f"- {file}")

          subprocess.run(
              [
                  "mypy",
                  "--python-version",
                  "3.11",
                  "--ignore-missing-imports",
                  "--follow-imports=skip",
                  *files,
              ],
              check=True,
          )
          PY

  api-tests:
    name: pytest api
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ci == 'true'
    env:
      DATABASE_URL: sqlite+pysqlite:////tmp/clara_api_ci.db
      AUTH_AUTO_PROVISION_USERS: "true"
      AUTH_REQUIRE_EMAIL_VERIFICATION: "false"
      AUTH_BOOTSTRAP_ADMIN_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml

      - name: Install pytest
        run: |
          cd services/api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run API pytest
        run: |
          if [ -d "services/api/tests" ]; then
            cd services/api
            pytest -q tests --junitxml=/tmp/pytest-api.xml
          else
            echo "No services/api/tests directory found. Skip API pytest."
          fi

      - name: Upload API pytest artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-api-${{ github.run_id }}
          path: /tmp/pytest-api.xml
          if-no-files-found: ignore

  ml-tests:
    name: pytest ml
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ml/pyproject.toml

      - name: Install pytest
        run: |
          cd services/ml
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ML pytest
        run: |
          if [ -d "services/ml/tests" ]; then
            cd services/ml
            pytest -q tests --junitxml=/tmp/pytest-ml.xml
          else
            echo "No services/ml/tests directory found. Skip ML pytest."
          fi

      - name: Upload ML pytest artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-ml-${{ github.run_id }}
          path: /tmp/pytest-ml.xml
          if-no-files-found: ignore

  web-lint-build:
    name: web lint + build
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: |
          cd apps/web
          npm ci

      - name: Run web lint
        env:
          CI: "true"
        run: |
          cd apps/web
          npm run lint

      - name: Run web build
        run: |
          cd apps/web
          npm run build

  security-audit:
    name: security audit
    runs-on: ubuntu-latest
    needs: changes
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 20
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/api/pyproject.toml
            services/ml/pyproject.toml

      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit>=2.7.0"
          pip install -e services/api -e services/ml
          pip-audit --progress-spinner=off

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run npm audit
        run: |
          cd apps/web
          npm ci
          npm audit --omit=dev --audit-level=critical

  docker-compose-smoke:
    name: docker compose smoke build
    runs-on: ubuntu-latest
    needs: changes
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 25
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare env file
        run: |
          if [ ! -f ".env" ]; then
            cp .env.example .env
          fi

      - name: Docker compose build smoke
        run: |
          attempt=1
          max_attempts=3
          until docker compose --env-file .env -f deploy/docker/docker-compose.app.yml build api ml web; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Docker compose smoke build failed after ${max_attempts} attempts."
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retry docker compose build in ${sleep_seconds}s (attempt $((attempt + 1))/${max_attempts})..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Docker compose config validate
        run: |
          docker compose --env-file .env -f deploy/docker/docker-compose.app.yml config >/dev/null

      - name: Collect docker smoke logs on failure
        if: failure()
        run: |
          docker compose --env-file .env -f deploy/docker/docker-compose.app.yml logs --no-color > /tmp/docker-smoke.log || true

      - name: Upload docker smoke logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-smoke-${{ github.run_id }}
          path: /tmp/docker-smoke.log
          if-no-files-found: ignore

  container-scan:
    name: container scan (trivy)
    runs-on: ubuntu-latest
    needs: changes
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare env file
        run: |
          if [ ! -f ".env" ]; then
            cp .env.example .env
          fi

      - name: Build images for scan
        env:
          COMPOSE_PROJECT_NAME: clara-scan
        run: |
          attempt=1
          max_attempts=3
          until docker compose --env-file .env -f deploy/docker/docker-compose.app.yml build api ml web; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Docker image build for container scan failed after ${max_attempts} attempts."
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retry docker image build in ${sleep_seconds}s (attempt $((attempt + 1))/${max_attempts})..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy container scan
        env:
          COMPOSE_PROJECT_NAME: clara-scan
        run: |
          mkdir -p /tmp/trivy-reports
          images=("${COMPOSE_PROJECT_NAME}-api" "${COMPOSE_PROJECT_NAME}-ml" "${COMPOSE_PROJECT_NAME}-web")
          scan_exit=0
          for image in "${images[@]}"; do
            echo "Scanning ${image}..."
            trivy image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format table \
              --output "/tmp/trivy-reports/${image}.txt" \
              "${image}" || true

            if ! trivy image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              --quiet \
              "${image}"; then
              echo "High/Critical vulnerabilities found in ${image}."
              scan_exit=1
            fi
          done
          exit $scan_exit

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-reports-${{ github.run_id }}
          path: /tmp/trivy-reports
          if-no-files-found: ignore

  required-ci-gates:
    name: required-ci-gates
    runs-on: ubuntu-latest
    if: always()
    needs:
      - quality
      - api-tests
      - ml-tests
      - web-lint-build
      - security-audit
      - docker-compose-smoke
      - container-scan
    steps:
      - name: Evaluate required checks
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          API_TESTS_RESULT: ${{ needs.api-tests.result }}
          ML_TESTS_RESULT: ${{ needs.ml-tests.result }}
          WEB_RESULT: ${{ needs.web-lint-build.result }}
          SECURITY_RESULT: ${{ needs.security-audit.result }}
          DOCKER_SMOKE_RESULT: ${{ needs.docker-compose-smoke.result }}
          CONTAINER_SCAN_RESULT: ${{ needs.container-scan.result }}
        run: |
          set -euo pipefail

          is_ok() {
            case "$1" in
              success|skipped)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          check_required_job() {
            job_name="$1"
            job_result="$2"
            if ! is_ok "$job_result"; then
              echo "::error::Blocking check failed: ${job_name} (result=${job_result})"
              return 1
            fi
            echo "Blocking check passed: ${job_name} (result=${job_result})"
            return 0
          }

          status=0
          advisory_notes=()

          check_required_job "quality" "$QUALITY_RESULT" || status=1
          check_required_job "api-tests" "$API_TESTS_RESULT" || status=1
          check_required_job "ml-tests" "$ML_TESTS_RESULT" || status=1
          check_required_job "web-lint-build" "$WEB_RESULT" || status=1

          if [ "$EVENT_NAME" != "pull_request" ]; then
            check_required_job "security-audit" "$SECURITY_RESULT" || status=1
            check_required_job "docker-compose-smoke" "$DOCKER_SMOKE_RESULT" || status=1
            check_required_job "container-scan" "$CONTAINER_SCAN_RESULT" || status=1
          else
            echo "Pull request mode: security-audit, docker-compose-smoke, container-scan are advisory."
            for advisory in \
              "security-audit:$SECURITY_RESULT" \
              "docker-compose-smoke:$DOCKER_SMOKE_RESULT" \
              "container-scan:$CONTAINER_SCAN_RESULT"; do
              name="${advisory%%:*}"
              result="${advisory##*:}"
              if ! is_ok "$result"; then
                advisory_notes+=("${name}=${result}")
                echo "::warning::Advisory check failed on PR: ${name} (result=${result})"
              fi
            done
          fi

          {
            echo "### CI Gate Summary"
            echo ""
            echo "- Event: \`${EVENT_NAME}\`"
            echo "- Ref: \`${EVENT_REF}\`"
            echo "- quality: \`${QUALITY_RESULT}\`"
            echo "- api-tests: \`${API_TESTS_RESULT}\`"
            echo "- ml-tests: \`${ML_TESTS_RESULT}\`"
            echo "- web-lint-build: \`${WEB_RESULT}\`"
            echo "- security-audit: \`${SECURITY_RESULT}\`"
            echo "- docker-compose-smoke: \`${DOCKER_SMOKE_RESULT}\`"
            echo "- container-scan: \`${CONTAINER_SCAN_RESULT}\`"
            if [ "${#advisory_notes[@]}" -gt 0 ]; then
              echo ""
              echo "#### Advisory Failures (PR only)"
              for note in "${advisory_notes[@]}"; do
                echo "- ${note}"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $status
