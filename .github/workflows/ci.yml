name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: detect changed files
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ml: ${{ steps.filter.outputs.ml }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
      python: ${{ steps.filter.outputs.python }}
      python_changed_files: ${{ steps.filter.outputs.python_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: json
          filters: |
            api:
              - 'services/api/**'
            ml:
              - 'services/ml/**'
            web:
              - 'apps/web/**'
            docs:
              - 'docs/**'
            docker:
              - 'deploy/docker/**'
              - 'services/**/Dockerfile'
              - 'apps/web/Dockerfile'
              - '.env.example'
            ci:
              - '.github/workflows/**'
              - 'scripts/docs/**'
              - 'Makefile'
              - 'README.md'
            python:
              - 'services/**/*.py'
              - 'scripts/**/*.py'
              - 'services/**/pyproject.toml'
            python_changed:
              - 'services/**/*.py'
              - 'scripts/**/*.py'

  quality:
    name: docs-check + ruff + mypy
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" "mypy==1.11.2" "pytest==8.3.2"

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run docs-check
        run: |
          bash scripts/docs/check-docs-links.sh

      - name: Run Ruff
        env:
          PY_CHANGED_FILES: ${{ needs.changes.outputs.python_changed_files }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected. Skip incremental Ruff."
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          raw = os.getenv("PY_CHANGED_FILES", "").strip()
          files: list[str] = []
          if raw:
              try:
                  parsed = json.loads(raw)
              except json.JSONDecodeError as exc:
                  print(f"Unable to parse PY_CHANGED_FILES: {exc}")
                  sys.exit(1)
              if isinstance(parsed, list):
                  files = [str(item) for item in parsed if str(item).endswith(".py")]

          if not files:
              print("No changed Python files. Skip Ruff.")
              sys.exit(0)

          print("Running Ruff for files:")
          for file in files:
              print(f"- {file}")

          subprocess.run(["ruff", "check", "--extend-ignore", "B008", *files], check=True)
          PY

      - name: Run mypy
        env:
          PY_CHANGED_FILES: ${{ needs.changes.outputs.python_changed_files }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected. Skip incremental mypy."
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          raw = os.getenv("PY_CHANGED_FILES", "").strip()
          files: list[str] = []
          if raw:
              try:
                  parsed = json.loads(raw)
              except json.JSONDecodeError as exc:
                  print(f"Unable to parse PY_CHANGED_FILES: {exc}")
                  sys.exit(1)
              if isinstance(parsed, list):
                  files = [str(item) for item in parsed if str(item).endswith(".py")]

          if not files:
              print("No changed Python files. Skip mypy.")
              sys.exit(0)

          print("Running mypy for files:")
          for file in files:
              print(f"- {file}")

          subprocess.run(
              [
                  "mypy",
                  "--python-version",
                  "3.11",
                  "--ignore-missing-imports",
                  "--follow-imports=skip",
                  *files,
              ],
              check=True,
          )
          PY

  api-tests:
    name: pytest api
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true'
    env:
      DATABASE_URL: sqlite+pysqlite:////tmp/clara_api_ci.db
      AUTH_AUTO_PROVISION_USERS: "true"
      AUTH_REQUIRE_EMAIL_VERIFICATION: "false"
      AUTH_BOOTSTRAP_ADMIN_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          cd services/api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run API pytest
        run: |
          if [ -d "services/api/tests" ]; then
            cd services/api
            pytest -q tests
          else
            echo "No services/api/tests directory found. Skip API pytest."
          fi

  ml-tests:
    name: pytest ml
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.ml == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          cd services/ml
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ML pytest
        run: |
          if [ -d "services/ml/tests" ]; then
            cd services/ml
            pytest -q tests
          else
            echo "No services/ml/tests directory found. Skip ML pytest."
          fi

  web-lint-build:
    name: web lint + build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: |
          cd apps/web
          npm ci

      - name: Run web lint
        run: |
          cd apps/web
          npm run lint

      - name: Run web build
        run: |
          cd apps/web
          npm run build

  security-audit:
    name: security audit
    runs-on: ubuntu-latest
    needs: changes
    continue-on-error: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit>=2.7.0"
          pip install -e services/api -e services/ml
          pip-audit --progress-spinner=off

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run npm audit
        run: |
          cd apps/web
          npm ci
          npm audit --omit=dev --audit-level=critical

  docker-compose-smoke:
    name: docker compose smoke build
    runs-on: ubuntu-latest
    needs: changes
    continue-on-error: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        run: |
          if [ ! -f ".env" ]; then
            cp .env.example .env
          fi

      - name: Docker compose build smoke
        run: |
          docker compose --env-file .env -f deploy/docker/docker-compose.app.yml build api ml web

      - name: Docker compose config validate
        run: |
          docker compose --env-file .env -f deploy/docker/docker-compose.app.yml config >/dev/null
